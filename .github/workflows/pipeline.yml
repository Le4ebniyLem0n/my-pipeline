name: CI quality + Telegram

on:
  pull_request:
    branches: ["main"]
    types: ["closed"]

jobs:
  quality:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/ticket-')
    runs-on: ubuntu-latest

    outputs:
      report_path: reports/flake8_report.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 and save report
        id: flake8
        run: |
          mkdir -p reports
          set +e
          flake8 . > reports/flake8_report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: reports/flake8_report.txt

      - name: Fail if flake8 found issues
        if: steps.flake8.outputs.exit_code != '0'
        run: exit 1

  telegram_notify:
    needs: quality
    if: always() && github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/ticket-')
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESULT: ${{ needs.quality.result }}
        run: |
          STATUS_EMOJI="✅"
          if [ "$RESULT" != "success" ]; then
            STATUS_EMOJI="❌"
          fi

          TEXT=$(printf "%s *Pipeline Result:* %s\n\n📦 *Repository:* %s\n🔀 *Merged Branch:* %s → %s\n📅 *Merged At:* %s\n\n🔗 *PR:* %s\n📎 *Run:* %s/%s/actions/runs/%s" \
            "$STATUS_EMOJI" \
            "$RESULT" \
            "${{ github.repository }}" \
            "${{ github.head_ref }}" \
            "${{ github.base_ref }}" \
            "${{ github.event.pull_request.merged_at }}" \
            "${{ github.event.pull_request.html_url }}" \
            "${{ github.server_url }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${TEXT}"
